name: Bug report
description: Report a reproducible problem in bootstrap or documentation
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide a minimal reproducible report.
  - type: input
    id: os_version
    attributes:
      label: macOS version
      placeholder: "macOS 26.4"
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: "arm64"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Exact command line you ran
      placeholder: "./install-macos.sh --start-orbstack"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Paste only relevant output
      render: shell
    validations:
      required: true
